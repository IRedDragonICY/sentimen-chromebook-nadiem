<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="740" viewBox="0 0 1220 740"><defs><marker id="arw" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7C766C"/></marker><marker id="arwR" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#D65A59"/></marker><marker id="arwG" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#199e70"/></marker></defs><text x="56" y="52" font-family="Noto Sans" font-size="13" font-weight="700" fill="#1F9E72" text-anchor="start" letter-spacing="2.5">PRAPEMROSESAN . TEKS</text><text x="55" y="88" font-family="Noto Sans" font-size="29" font-weight="800" fill="#1A1614" text-anchor="start">Normalisasi Teks: Tiga Representasi dari Satu Sumber</text><text x="56" y="116" font-family="Noto Sans" font-size="15" font-weight="400" fill="#5C564F" text-anchor="start">Teks mentah tidak pernah dibuang; tiap fungsi menurunkan bentuk untuk keperluan yang berbeda</text><rect x="56" y="132" width="64" height="4" rx="2" fill="#1baf7a"/><text x="1164" y="52" font-family="Noto Sans" font-size="13" font-weight="700" fill="#8A837A" text-anchor="end">normalisasi.py</text><rect x="400.0" y="171" width="420" height="72.0" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="400.0" y="168" width="420" height="72.0" rx="13" ry="13" fill="#FCEED1" stroke="#E0A83A" stroke-width="1.8"/><rect x="400.0" y="179" width="5" height="50.0" rx="2.5" fill="#E0A83A"/><text x="418.0" y="197.5" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">Teks komentar mentah</text><text x="418.0" y="216.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">contoh: "Gaji hakim naik 280%?? (emoji sedih) kacau"</text><rect x="95" y="303" width="300" height="125.2" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="95" y="300" width="300" height="125.2" rx="13" ry="13" fill="#E0F2EA" stroke="#1F9E72" stroke-width="1.8"/><rect x="95" y="311" width="5" height="103.2" rx="2.5" fill="#1F9E72"/><text x="113" y="330" font-family="Noto Sans" font-size="16" font-weight="700" fill="#1A1614" text-anchor="start">bersihkan( )</text><text x="113" y="347.8" font-family="Noto Sans" font-size="11.8" font-weight="400" fill="#5C564F" text-anchor="start">Normalisasi ringan untuk masukan model.</text><text x="113" y="365.6" font-family="Noto Sans" font-size="11.8" font-weight="400" fill="#5C564F" text-anchor="start">Menerapkan NFKC (melipat huruf mewah),</text><text x="113" y="383.40000000000003" font-family="Noto Sans" font-size="11.8" font-weight="400" fill="#5C564F" text-anchor="start">membuang karakter kontrol, merapikan spasi.</text><text x="113" y="401.20000000000005" font-family="Noto Sans" font-size="11.8" font-weight="400" fill="#5C564F" text-anchor="start">Huruf besar dan emoji tetap dipertahankan.</text><path d="M610.0 240.0 L610.0 268 L245 268 L245 300" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="115" y="451.2" width="260" height="50" rx="10" fill="#1a140f" opacity="0.05"/><rect x="115" y="449.2" width="260" height="50" rx="10" fill="#FFFDF6" stroke="#D9C9A0" stroke-width="1.5"/><text x="126" y="470.2" font-family="Noto Sans" font-size="12" font-weight="700" fill="#1A1614" text-anchor="start">Dipakai sama saat latih dan inferensi</text><text x="126" y="485.2" font-family="Noto Sans" font-size="11" font-weight="400" fill="#5C564F" text-anchor="start">sehingga tidak ada beda perlakuan</text><rect x="485" y="303" width="300" height="125.2" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="485" y="300" width="300" height="125.2" rx="13" ry="13" fill="#E1ECFB" stroke="#2F79D6" stroke-width="1.8"/><rect x="485" y="311" width="5" height="103.2" rx="2.5" fill="#2F79D6"/><text x="503" y="330" font-family="Noto Sans" font-size="16" font-weight="700" fill="#1A1614" text-anchor="start">kunci_duplikat( )</text><text x="503" y="347.8" font-family="Noto Sans" font-size="11.8" font-weight="400" fill="#5C564F" text-anchor="start">Kunci agresif untuk klaster near-duplikat.</text><text x="503" y="365.6" font-family="Noto Sans" font-size="11.8" font-weight="400" fill="#5C564F" text-anchor="start">casefold, membuang angka, tanda baca, spasi,</text><text x="503" y="383.40000000000003" font-family="Noto Sans" font-size="11.8" font-weight="400" fill="#5C564F" text-anchor="start">dan huruf mewah. Komentar beremoji saja</text><text x="503" y="401.20000000000005" font-family="Noto Sans" font-size="11.8" font-weight="400" fill="#5C564F" text-anchor="start">diwakili himpunan emojinya.</text><path d="M610.0 240.0 L610.0 268 L635 268 L635 300" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="505" y="451.2" width="260" height="50" rx="10" fill="#1a140f" opacity="0.05"/><rect x="505" y="449.2" width="260" height="50" rx="10" fill="#FFFDF6" stroke="#D9C9A0" stroke-width="1.5"/><text x="516" y="470.2" font-family="Noto Sans" font-size="12" font-weight="700" fill="#1A1614" text-anchor="start">Mencegah kebocoran latih dan uji</text><text x="516" y="485.2" font-family="Noto Sans" font-size="11" font-weight="400" fill="#5C564F" text-anchor="start">serta mendeteksi spam berulang</text><rect x="875" y="303" width="300" height="125.2" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="875" y="300" width="300" height="125.2" rx="13" ry="13" fill="#F6E7F1" stroke="#B0559A" stroke-width="1.8"/><rect x="875" y="311" width="5" height="103.2" rx="2.5" fill="#B0559A"/><text x="893" y="330" font-family="Noto Sans" font-size="16" font-weight="700" fill="#1A1614" text-anchor="start">daftar_emoji( )</text><text x="893" y="347.8" font-family="Noto Sans" font-size="11.8" font-weight="400" fill="#5C564F" text-anchor="start">Ekstraksi emoji untuk analisis afeksi.</text><text x="893" y="365.6" font-family="Noto Sans" font-size="11.8" font-weight="400" fill="#5C564F" text-anchor="start">Mencakup rentang Unicode yang luas beserta</text><text x="893" y="383.40000000000003" font-family="Noto Sans" font-size="11.8" font-weight="400" fill="#5C564F" text-anchor="start">penyerta seperti ZWJ dan variation selector</text><text x="893" y="401.20000000000005" font-family="Noto Sans" font-size="11.8" font-weight="400" fill="#5C564F" text-anchor="start">agar tidak ada emoji yang terlewat.</text><path d="M610.0 240.0 L610.0 268 L1025 268 L1025 300" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="895" y="451.2" width="260" height="50" rx="10" fill="#1a140f" opacity="0.05"/><rect x="895" y="449.2" width="260" height="50" rx="10" fill="#FFFDF6" stroke="#D9C9A0" stroke-width="1.5"/><text x="906" y="470.2" font-family="Noto Sans" font-size="12" font-weight="700" fill="#1A1614" text-anchor="start">Menjadi dasar aturan emosi</text><text x="906" y="485.2" font-family="Noto Sans" font-size="11" font-weight="400" fill="#5C564F" text-anchor="start">untuk komentar berisi emoji saja</text><text x="610.0" y="706" font-family="Noto Sans" font-size="13" font-weight="600" fill="#5C564F" text-anchor="middle">Prinsip: fungsi yang sama dipakai saat pelatihan dan inferensi; emoji dianggap sinyal, bukan derau.</text></svg>