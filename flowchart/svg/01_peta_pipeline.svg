<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1180" viewBox="0 0 1240 1180"><defs><marker id="arw" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7C766C"/></marker><marker id="arwR" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#D65A59"/></marker><marker id="arwG" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#199e70"/></marker></defs><text x="56" y="52" font-family="Noto Sans" font-size="13" font-weight="700" fill="#1F9E72" text-anchor="start" letter-spacing="2.5">PETA ALUR SISTEM</text><text x="55" y="88" font-family="Noto Sans" font-size="29" font-weight="800" fill="#1A1614" text-anchor="start">Analisis Sentimen: dari Data Mentah ke Aplikasi</text><text x="56" y="116" font-family="Noto Sans" font-size="15" font-weight="400" fill="#5C564F" text-anchor="start">Delapan tahap yang terdokumentasi dan dapat diproduksi ulang atas 38.845 komentar Instagram</text><rect x="56" y="132" width="64" height="4" rx="2" fill="#1baf7a"/><text x="1184" y="52" font-family="Noto Sans" font-size="13" font-weight="700" fill="#8A837A" text-anchor="end">Ikhtisar</text><rect x="70" y="171" width="560" height="90.5" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="70" y="168" width="560" height="90.5" rx="13" ry="13" fill="#E0F2EA" stroke="#1F9E72" stroke-width="1.8"/><rect x="70" y="179" width="5" height="68.5" rx="2.5" fill="#1F9E72"/><text x="88" y="197.5" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">1   Membaca dan membangun dataset</text><text x="88" y="216.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">Membaca 11 berkas CSV, memvalidasi setiap baris,</text><text x="88" y="234.5" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">menggabungkan timestamp, menghitung kolom turunan</text><rect x="700" y="194.25" width="470" height="44" rx="10" fill="#1a140f" opacity="0.05"/><rect x="700" y="192.25" width="470" height="44" rx="10" fill="#F0EDE8" stroke="#9A9186" stroke-width="1.5"/><text x="711" y="214.75" font-family="Noto Sans" font-size="13.5" font-weight="700" fill="#1A1614" text-anchor="start">komentar.parquet</text><text x="711" y="230.25" font-family="Noto Sans" font-size="11.5" font-weight="400" fill="#5C564F" text-anchor="start">38.845 komentar beserta profil.json (sha256)</text><path d="M630 213.25 L700 214.25" fill="none" stroke="#7C766C" stroke-width="1.7" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="70" y="295.5" width="560" height="90.5" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="70" y="292.5" width="560" height="90.5" rx="13" ry="13" fill="#E0F2EA" stroke="#1F9E72" stroke-width="1.8"/><rect x="70" y="303.5" width="5" height="68.5" rx="2.5" fill="#1F9E72"/><text x="88" y="322.0" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">2   Sampling terstratifikasi</text><text x="88" y="340.5" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">Unit sampel berupa wakil klaster agar tidak bocor;</text><text x="88" y="359.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">strata menurut fase, tipe teks, dan tingkat likes</text><path d="M350.0 258.5 L350.0 292.5" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="700" y="318.75" width="470" height="44" rx="10" fill="#1a140f" opacity="0.05"/><rect x="700" y="316.75" width="470" height="44" rx="10" fill="#F0EDE8" stroke="#9A9186" stroke-width="1.5"/><text x="711" y="339.25" font-family="Noto Sans" font-size="13.5" font-weight="700" fill="#1A1614" text-anchor="start">gold_todo.csv dan silver_todo.csv</text><text x="711" y="354.75" font-family="Noto Sans" font-size="11.5" font-weight="400" fill="#5C564F" text-anchor="start">kandidat untuk pelabelan</text><path d="M630 337.75 L700 338.75" fill="none" stroke="#7C766C" stroke-width="1.7" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="70" y="420.0" width="560" height="90.5" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="70" y="417.0" width="560" height="90.5" rx="13" ry="13" fill="#ECE8F7" stroke="#6B5BD1" stroke-width="1.8"/><rect x="70" y="428.0" width="5" height="68.5" rx="2.5" fill="#6B5BD1"/><text x="88" y="446.5" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">3   Pelabelan tiga lapis</text><text x="88" y="465.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">Gold 710 komentar dilabeli manusia sebagai acuan uji,</text><text x="88" y="483.5" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">silver 5.912 komentar dilabeli LLM lokal untuk melatih</text><path d="M350.0 383.0 L350.0 417.0" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="700" y="443.25" width="470" height="44" rx="10" fill="#1a140f" opacity="0.05"/><rect x="700" y="441.25" width="470" height="44" rx="10" fill="#F0EDE8" stroke="#9A9186" stroke-width="1.5"/><text x="711" y="463.75" font-family="Noto Sans" font-size="13.5" font-weight="700" fill="#1A1614" text-anchor="start">skema label: spam (2), sikap (6), emosi (5)</text><text x="711" y="479.25" font-family="Noto Sans" font-size="11.5" font-weight="400" fill="#5C564F" text-anchor="start">satu komentar, tiga label</text><path d="M630 462.25 L700 463.25" fill="none" stroke="#7C766C" stroke-width="1.7" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="70" y="544.5" width="560" height="90.5" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="70" y="541.5" width="560" height="90.5" rx="13" ry="13" fill="#E1ECFB" stroke="#2F79D6" stroke-width="1.8"/><rect x="70" y="552.5" width="5" height="68.5" rx="2.5" fill="#2F79D6"/><text x="88" y="571.0" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">4   Menyusun train, val, dan test</text><text x="88" y="589.5" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">Pembagian berbasis klaster dan distratifikasi sikap;</text><text x="88" y="608.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">val dan test hanya dari gold berlabel manusia</text><path d="M350.0 507.5 L350.0 541.5" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="700" y="567.75" width="470" height="44" rx="10" fill="#1a140f" opacity="0.05"/><rect x="700" y="565.75" width="470" height="44" rx="10" fill="#F0EDE8" stroke="#9A9186" stroke-width="1.5"/><text x="711" y="588.25" font-family="Noto Sans" font-size="13.5" font-weight="700" fill="#1A1614" text-anchor="start">train 6.233, val 106, test 283</text><text x="711" y="603.75" font-family="Noto Sans" font-size="11.5" font-weight="400" fill="#5C564F" text-anchor="start">pembagian tanpa kebocoran</text><path d="M630 586.75 L700 587.75" fill="none" stroke="#7C766C" stroke-width="1.7" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="70" y="669.0" width="560" height="90.5" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="70" y="666.0" width="560" height="90.5" rx="13" ry="13" fill="#E1EFEB" stroke="#0E6B5E" stroke-width="1.8"/><rect x="70" y="677.0" width="5" height="68.5" rx="2.5" fill="#0E6B5E"/><text x="88" y="695.5" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">5   Melatih model</text><text x="88" y="714.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">Model dasar TF-IDF dan penyetelan halus IndoBERT</text><text x="88" y="732.5" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">multitugas (satu encoder, tiga kepala) berbobot kelas</text><path d="M350.0 632.0 L350.0 666.0" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="700" y="692.25" width="470" height="44" rx="10" fill="#1a140f" opacity="0.05"/><rect x="700" y="690.25" width="470" height="44" rx="10" fill="#F0EDE8" stroke="#9A9186" stroke-width="1.5"/><text x="711" y="712.75" font-family="Noto Sans" font-size="13.5" font-weight="700" fill="#1A1614" text-anchor="start">bobot model terbaik</text><text x="711" y="728.25" font-family="Noto Sans" font-size="11.5" font-weight="400" fill="#5C564F" text-anchor="start">dipilih berdasarkan macro-F1 validasi</text><path d="M630 711.25 L700 712.25" fill="none" stroke="#7C766C" stroke-width="1.7" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="70" y="793.5" width="560" height="90.5" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="70" y="790.5" width="560" height="90.5" rx="13" ry="13" fill="#F6E7F1" stroke="#B0559A" stroke-width="1.8"/><rect x="70" y="801.5" width="5" height="68.5" rx="2.5" fill="#B0559A"/><text x="88" y="820.0" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">6   Kalibrasi dan ambang abstain</text><text x="88" y="838.5" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">Penskalaan suhu tiap tugas serta ambang keyakinan</text><text x="88" y="857.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">agar akurasi bagian terjawab minimal 80 persen</text><path d="M350.0 756.5 L350.0 790.5" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="700" y="816.75" width="470" height="44" rx="10" fill="#1a140f" opacity="0.05"/><rect x="700" y="814.75" width="470" height="44" rx="10" fill="#F0EDE8" stroke="#9A9186" stroke-width="1.5"/><text x="711" y="837.25" font-family="Noto Sans" font-size="13.5" font-weight="700" fill="#1A1614" text-anchor="start">models/sentimen-id</text><text x="711" y="852.75" font-family="Noto Sans" font-size="11.5" font-weight="400" fill="#5C564F" text-anchor="start">pytorch_model.bin dan meta.json</text><path d="M630 835.75 L700 836.75" fill="none" stroke="#7C766C" stroke-width="1.7" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="70" y="918.0" width="560" height="90.5" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="70" y="915.0" width="560" height="90.5" rx="13" ry="13" fill="#E6EDF9" stroke="#3F6FB0" stroke-width="1.8"/><rect x="70" y="926.0" width="5" height="68.5" rx="2.5" fill="#3F6FB0"/><text x="88" y="944.5" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">7   Evaluasi yang jujur pada gold test</text><text x="88" y="963.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">macro-F1, F1 tiap kelas, dan selang kepercayaan;</text><text x="88" y="981.5" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">penyetelan halus: sikap 0,544  emosi 0,624  spam 1,00</text><path d="M350.0 881.0 L350.0 915.0" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="700" y="941.25" width="470" height="44" rx="10" fill="#1a140f" opacity="0.05"/><rect x="700" y="939.25" width="470" height="44" rx="10" fill="#F0EDE8" stroke="#9A9186" stroke-width="1.5"/><text x="711" y="961.75" font-family="Noto Sans" font-size="13.5" font-weight="700" fill="#1A1614" text-anchor="start">reports/evaluasi.json</text><text x="711" y="977.25" font-family="Noto Sans" font-size="11.5" font-weight="400" fill="#5C564F" text-anchor="start">empat model dibandingkan setara</text><path d="M630 960.25 L700 961.25" fill="none" stroke="#7C766C" stroke-width="1.7" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="70" y="1042.5" width="560" height="90.5" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="70" y="1039.5" width="560" height="90.5" rx="13" ry="13" fill="#DDEDE5" stroke="#0E4D45" stroke-width="1.8"/><rect x="70" y="1050.5" width="5" height="68.5" rx="2.5" fill="#0E4D45"/><text x="88" y="1069.0" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">8   Menyekor penuh dan menyajikan aplikasi</text><text x="88" y="1087.5" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">Menyekor 38.845 komentar sekali jalan, lalu disajikan</text><text x="88" y="1106.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">di Streamlit dan Space HuggingFace (Coba Model)</text><path d="M350.0 1005.5 L350.0 1039.5" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="700" y="1065.75" width="470" height="44" rx="10" fill="#1a140f" opacity="0.05"/><rect x="700" y="1063.75" width="470" height="44" rx="10" fill="#DDEDE5" stroke="#0E4D45" stroke-width="1.5"/><text x="711" y="1086.25" font-family="Noto Sans" font-size="13.5" font-weight="700" fill="#1A1614" text-anchor="start">skor.parquet menuju aplikasi</text><text x="711" y="1101.75" font-family="Noto Sans" font-size="11.5" font-weight="400" fill="#5C564F" text-anchor="start">sumber data tunggal antarmuka</text><path d="M630 1084.75 L700 1085.75" fill="none" stroke="#7C766C" stroke-width="1.7" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/></svg>