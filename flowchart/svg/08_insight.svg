<svg xmlns="http://www.w3.org/2000/svg" width="1880" height="1010" viewBox="0 0 1880 1010"><defs><marker id="arw" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7C766C"/></marker><marker id="arwR" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#D65A59"/></marker><marker id="arwG" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#199e70"/></marker></defs><text x="60" y="52" font-family="Noto Sans" font-size="16" font-weight="600" fill="#574C42" text-anchor="start">Sembilan temuan: empat dari data, lima dari proses membangun sistem.</text><rect x="60" y="74" width="15" height="15" rx="4" fill="#FBE7A8"/><text x="84" y="87" font-family="Noto Sans" font-size="12.5" font-weight="700" fill="#7a6a52" text-anchor="start">Temuan data</text><rect x="230" y="74" width="15" height="15" rx="4" fill="#BFE8D8"/><text x="254" y="87" font-family="Noto Sans" font-size="12.5" font-weight="700" fill="#7a6a52" text-anchor="start">Pelajaran teknis</text><g transform="rotate(-1.5 340.0 221.0)"><rect x="65" y="136" width="560" height="186" rx="14" fill="#1a140f" opacity="0.13"/><rect x="60" y="128" width="560" height="186" rx="14" fill="#FBE7A8"/><path d="M594 314 L620 288 L620 314 Z" fill="#E9D083" opacity="0.8"/><g transform="rotate(-5 340.0 122)"><rect x="288.0" y="109" width="104" height="26" rx="3" fill="#FFFFFF" opacity="0.42" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1"/></g><circle cx="86" cy="156" r="4.5" fill="#93650A"/><text x="98" y="160" font-family="Noto Sans" font-size="11.5" font-weight="700" fill="#93650A" letter-spacing="1.5">TEMUAN DATA</text><text x="598" y="180.6" font-family="Noto Sans" font-size="34" font-weight="800" fill="#93650A" text-anchor="end">27,3%</text><text x="82" y="194" font-family="Noto Sans" font-size="20.5" font-weight="800" fill="#2A211B">Sorotan tertuju ke sistem hukum</text><text x="82" y="222" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">Kritik peradilan mencapai 22,8% dari seluruh komentar</text><text x="82" y="243" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">dan memuncak 27,3% pada fase vonis, melampaui yang</text><text x="82" y="264" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">menyalahkan Nadiem secara langsung (kontra 17%).</text></g><g transform="rotate(1.1 940.0 221.0)"><rect x="665" y="136" width="560" height="186" rx="14" fill="#1a140f" opacity="0.13"/><rect x="660" y="128" width="560" height="186" rx="14" fill="#FBDCC0"/><path d="M1194 314 L1220 288 L1220 314 Z" fill="#E9C6A4" opacity="0.8"/><g transform="rotate(-5 940.0 122)"><rect x="888.0" y="109" width="104" height="26" rx="3" fill="#FFFFFF" opacity="0.42" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1"/></g><circle cx="686" cy="156" r="4.5" fill="#A2551F"/><text x="698" y="160" font-family="Noto Sans" font-size="11.5" font-weight="700" fill="#A2551F" letter-spacing="1.5">TEMUAN DATA</text><text x="1198" y="180.6" font-family="Noto Sans" font-size="34" font-weight="800" fill="#A2551F" text-anchor="end">60%</text><text x="682" y="194" font-family="Noto Sans" font-size="20.5" font-weight="800" fill="#2A211B">Wacana bernada duka dan marah</text><text x="682" y="222" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">Duka 30,1% dan marah 29,6% mengisi hampir enam dari</text><text x="682" y="243" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">sepuluh komentar, sedangkan harapan hanya 8,2%.</text><text x="682" y="264" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">Emosi negatif jelas mendominasi percakapan.</text></g><g transform="rotate(-0.8 1540.0 221.0)"><rect x="1265" y="136" width="560" height="186" rx="14" fill="#1a140f" opacity="0.13"/><rect x="1260" y="128" width="560" height="186" rx="14" fill="#F8CEDA"/><path d="M1794 314 L1820 288 L1820 314 Z" fill="#E7B5C5" opacity="0.8"/><g transform="rotate(-5 1540.0 122)"><rect x="1488.0" y="109" width="104" height="26" rx="3" fill="#FFFFFF" opacity="0.42" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1"/></g><circle cx="1286" cy="156" r="4.5" fill="#A3385A"/><text x="1298" y="160" font-family="Noto Sans" font-size="11.5" font-weight="700" fill="#A3385A" letter-spacing="1.5">TEMUAN DATA</text><text x="1798" y="180.6" font-family="Noto Sans" font-size="34" font-weight="800" fill="#A3385A" text-anchor="end">26,5%</text><text x="1282" y="194" font-family="Noto Sans" font-size="20.5" font-weight="800" fill="#2A211B">Kelas terbesar justru "tak jelas"</text><text x="1282" y="222" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">Sebanyak 26,5% komentar tergolong ambigu atau</text><text x="1282" y="243" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">sarkastik, melebihi yang pro (25,1%) dan kontra (17%).</text><text x="1282" y="264" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">Sarkasme dan campur bahasa menyulitkan pelabelan.</text></g><g transform="rotate(1.4 340.0 455.0)"><rect x="65" y="370" width="560" height="186" rx="14" fill="#1a140f" opacity="0.13"/><rect x="60" y="362" width="560" height="186" rx="14" fill="#F8CBC2"/><path d="M594 548 L620 522 L620 548 Z" fill="#E9B1A6" opacity="0.8"/><g transform="rotate(-5 340.0 356)"><rect x="288.0" y="343" width="104" height="26" rx="3" fill="#FFFFFF" opacity="0.42" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1"/></g><circle cx="86" cy="390" r="4.5" fill="#B03A2E"/><text x="98" y="394" font-family="Noto Sans" font-size="11.5" font-weight="700" fill="#B03A2E" letter-spacing="1.5">TEMUAN DATA</text><text x="598" y="414.6" font-family="Noto Sans" font-size="34" font-weight="800" fill="#B03A2E" text-anchor="end">76%</text><text x="82" y="428" font-family="Noto Sans" font-size="20.5" font-weight="800" fill="#2A211B">Perhatian meledak di titik vonis</text><text x="82" y="456" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">Dari 38.845 komentar, 76% muncul pada rentang Juni</text><text x="82" y="477" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">sampai Juli 2026. Percakapan terpusat pada momen</text><text x="82" y="498" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">peristiwa, bukan menyebar merata sepanjang kasus.</text></g><g transform="rotate(-1.2 940.0 455.0)"><rect x="665" y="370" width="560" height="186" rx="14" fill="#1a140f" opacity="0.13"/><rect x="660" y="362" width="560" height="186" rx="14" fill="#BFE8D8"/><path d="M1194 548 L1220 522 L1220 548 Z" fill="#A2D6C2" opacity="0.8"/><g transform="rotate(-5 940.0 356)"><rect x="888.0" y="343" width="104" height="26" rx="3" fill="#FFFFFF" opacity="0.42" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1"/></g><circle cx="686" cy="390" r="4.5" fill="#0E6B5E"/><text x="698" y="394" font-family="Noto Sans" font-size="11.5" font-weight="700" fill="#0E6B5E" letter-spacing="1.5">PELAJARAN TEKNIS</text><text x="682" y="428" font-family="Noto Sans" font-size="20.5" font-weight="800" fill="#2A211B">Data mentah kotor secara sistemik</text><text x="682" y="456" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">Timestamp seperti "30/6/2026, 21.43.41" berkoma tanpa</text><text x="682" y="477" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">kutip membuat tiap baris punya satu field ekstra.</text><text x="682" y="498" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">Pengurai wajib memeriksa bentuk baris, bukan header.</text></g><g transform="rotate(0.9 1540.0 455.0)"><rect x="1265" y="370" width="560" height="186" rx="14" fill="#1a140f" opacity="0.13"/><rect x="1260" y="362" width="560" height="186" rx="14" fill="#C6DBF4"/><path d="M1794 548 L1820 522 L1820 548 Z" fill="#AAC6E8" opacity="0.8"/><g transform="rotate(-5 1540.0 356)"><rect x="1488.0" y="343" width="104" height="26" rx="3" fill="#FFFFFF" opacity="0.42" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1"/></g><circle cx="1286" cy="390" r="4.5" fill="#295F9E"/><text x="1298" y="394" font-family="Noto Sans" font-size="11.5" font-weight="700" fill="#295F9E" letter-spacing="1.5">PELAJARAN TEKNIS</text><text x="1798" y="402.0" font-family="Noto Sans" font-size="20" font-weight="800" fill="#295F9E" text-anchor="end">0,544 vs 0,534</text><text x="1282" y="428" font-family="Noto Sans" font-size="20.5" font-weight="800" fill="#2A211B">Model canggih tak otomatis menang</text><text x="1282" y="456" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">Penyetelan halus IndoBERT (macro-F1 0,544) hanya</text><text x="1282" y="477" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">sedikit di atas TF-IDF dengan regresi logistik (0,534).</text><text x="1282" y="498" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">Baseline sederhana harus dikalahkan agar klaim sahih.</text></g><g transform="rotate(-1.6 340.0 689.0)"><rect x="65" y="604" width="560" height="186" rx="14" fill="#1a140f" opacity="0.13"/><rect x="60" y="596" width="560" height="186" rx="14" fill="#D2E9B0"/><path d="M594 782 L620 756 L620 782 Z" fill="#BBD892" opacity="0.8"/><g transform="rotate(-5 340.0 590)"><rect x="288.0" y="577" width="104" height="26" rx="3" fill="#FFFFFF" opacity="0.42" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1"/></g><circle cx="86" cy="624" r="4.5" fill="#4E7A1E"/><text x="98" y="628" font-family="Noto Sans" font-size="11.5" font-weight="700" fill="#4E7A1E" letter-spacing="1.5">PELAJARAN TEKNIS</text><text x="598" y="648.6" font-family="Noto Sans" font-size="34" font-weight="800" fill="#4E7A1E" text-anchor="end">8.474</text><text x="82" y="662" font-family="Noto Sans" font-size="20.5" font-weight="800" fill="#2A211B">Evaluasi jujur menuntut anti-kebocoran</text><text x="82" y="690" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">Terdapat 8.474 baris near-duplikat. Membaginya per</text><text x="82" y="711" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">klaster, bukan per baris, mencegah komentar kembar</text><text x="82" y="732" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">bocor antara data latih dan data uji.</text></g><g transform="rotate(1.2 940.0 689.0)"><rect x="665" y="604" width="560" height="186" rx="14" fill="#1a140f" opacity="0.13"/><rect x="660" y="596" width="560" height="186" rx="14" fill="#DED4F1"/><path d="M1194 782 L1220 756 L1220 782 Z" fill="#C7B9E6" opacity="0.8"/><g transform="rotate(-5 940.0 590)"><rect x="888.0" y="577" width="104" height="26" rx="3" fill="#FFFFFF" opacity="0.42" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1"/></g><circle cx="686" cy="624" r="4.5" fill="#5B49A8"/><text x="698" y="628" font-family="Noto Sans" font-size="11.5" font-weight="700" fill="#5B49A8" letter-spacing="1.5">PELAJARAN TEKNIS</text><text x="1198" y="648.6" font-family="Noto Sans" font-size="34" font-weight="800" fill="#5B49A8" text-anchor="end">30,2%</text><text x="682" y="662" font-family="Noto Sans" font-size="20.5" font-weight="800" fill="#2A211B">Popularitas bukan proporsi</text><text x="682" y="690" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">Pada 1.000 komentar terpopuler, sikap pro naik ke</text><text x="682" y="711" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">30,2% dari 25,1% keseluruhan. Suara paling disukai</text><text x="682" y="732" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">tidak mewakili keseluruhan percakapan.</text></g><g transform="rotate(-0.6 1540.0 689.0)"><rect x="1265" y="604" width="560" height="186" rx="14" fill="#1a140f" opacity="0.13"/><rect x="1260" y="596" width="560" height="186" rx="14" fill="#C3E7EC"/><path d="M1794 782 L1820 756 L1820 782 Z" fill="#A6D6DD" opacity="0.8"/><g transform="rotate(-5 1540.0 590)"><rect x="1488.0" y="577" width="104" height="26" rx="3" fill="#FFFFFF" opacity="0.42" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1"/></g><circle cx="1286" cy="624" r="4.5" fill="#1E7C86"/><text x="1298" y="628" font-family="Noto Sans" font-size="11.5" font-weight="700" fill="#1E7C86" letter-spacing="1.5">PELAJARAN TEKNIS</text><text x="1798" y="648.6" font-family="Noto Sans" font-size="34" font-weight="800" fill="#1E7C86" text-anchor="end">11%</text><text x="1282" y="662" font-family="Noto Sans" font-size="20.5" font-weight="800" fill="#2A211B">Emoji adalah sinyal, bukan derau</text><text x="1282" y="690" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">Sebanyak 11% komentar hanya berisi emoji. Alih-alih</text><text x="1282" y="711" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">dibuang, emoji dipertahankan dan ditangani aturan</text><text x="1282" y="732" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42">emosi tersendiri agar afeksinya tidak hilang.</text></g><rect x="63" y="842" width="1760" height="104" rx="14" fill="#1a140f" opacity="0.10"/><rect x="60" y="836" width="1760" height="104" rx="14" fill="#FFF7E6" stroke="#E3CE96" stroke-width="1.8"/><rect x="60" y="836" width="7" height="104" rx="3.5" fill="#C89A22"/><text x="88" y="870" font-family="Noto Sans" font-size="13" font-weight="700" fill="#9A7414" text-anchor="start" letter-spacing="1.5">CATATAN ETIS DAN KETERBATASAN</text><text x="88" y="898" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42" text-anchor="start">Data berasal dari 11 unggahan Instagram, bukan survei yang mewakili opini publik Indonesia, sehingga hasilnya tidak boleh digeneralisasi.</text><text x="88" y="922" font-family="Noto Sans" font-size="14.5" font-weight="400" fill="#574C42" text-anchor="start">Sistem mengukur sentimen komentar, bukan menilai bersalah atau tidaknya siapa pun, dan menjunjung asas praduga tak bersalah.</text></svg>