<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="1200" viewBox="0 0 1300 1200"><defs><marker id="arw" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7C766C"/></marker><marker id="arwR" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#D65A59"/></marker><marker id="arwG" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#199e70"/></marker></defs><text x="56" y="52" font-family="Noto Sans" font-size="13" font-weight="700" fill="#1F9E72" text-anchor="start" letter-spacing="2.5">TAHAP 1 . PRAPEMROSESAN</text><text x="55" y="88" font-family="Noto Sans" font-size="29" font-weight="800" fill="#1A1614" text-anchor="start">11 Berkas CSV Mentah menjadi Satu Dataset Bersih</text><text x="56" y="116" font-family="Noto Sans" font-size="15" font-weight="400" fill="#5C564F" text-anchor="start">Data mentah tidak pernah diubah; pengurai memeriksa bentuk setiap baris secara eksplisit</text><rect x="56" y="132" width="64" height="4" rx="2" fill="#1baf7a"/><text x="1244" y="52" font-family="Noto Sans" font-size="13" font-weight="700" fill="#8A837A" text-anchor="end">build_dataset.py</text><rect x="300" y="171" width="520" height="90.5" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="300" y="168" width="520" height="90.5" rx="13" ry="13" fill="#FCEED1" stroke="#E0A83A" stroke-width="1.8"/><rect x="300" y="179" width="5" height="68.5" rx="2.5" fill="#E0A83A"/><text x="318" y="197.5" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">11 berkas CSV mentah</text><text x="318" y="216.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">Dua skema header (sepuluh berkas biasa dan satu berthread),</text><text x="318" y=