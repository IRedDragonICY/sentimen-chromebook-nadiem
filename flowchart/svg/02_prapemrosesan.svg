ly="Noto Sans" font-size="14" font-weight="700" fill="#1A1614" text-anchor="start">Anomali dicatat, proses berhenti</text><text x="978" y="449.0" font-family="Noto Sans" font-size="11.5" font-weight="400" fill="#5C564F" text-anchor="start">Program dihentikan (SystemExit) bila format</text><text x="978" y="466.5" font-family="Noto Sans" font-size="11.5" font-weight="400" fill="#5C564F" text-anchor="start">berubah, sebab lebih baik gagal daripada cacat</text><path d="M740.0 448.5 L960 448.5" fill="none" stroke="#D65A59" stroke-width="2.0" marker-end="url(#arwR)" stroke-linecap="round" stroke-linejoin="round"/><rect x="826.2" y="423.5" width="47.6" height="22" rx="11.0" fill="#FFFFFF" stroke="#E3DED6" stroke-width="1"/><text x="850.0" y="438.58" font-family="Noto Sans" font-size="12" font-weight="600" fill="#5C564F" text-anchor="middle">tidak</text><rect x="300" y="537.5" width="520" height="90.5" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="300" y="534.5" width="520" height="90.5" rx="13" ry="13" fill="#E0F2EA" stroke="#1F9E72" stroke-width="1.8"/><rect x="300" y="545.5" width="5" height="68.5" rx="2.5" fill="#1F9E72"/><text x="318" y="564.0" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">Menggabungkan dua field timestamp</text><text x="318" y="582.5" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">Nilai "30/6/2026, 21.43.41" mengandung koma tanpa</text><text x="318" y="601.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">kutip, sehingga tiap baris memiliki satu field ekstra</text><path d="M560.0 510.5 L560.0 534.5" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="546.28" y="511.5" width="27.44" height="22" rx="11.0" fill="#FFFFFF" stroke="#E3DED6" stroke-width="1"/><text x="560.0" y="526.58" font-family="Noto Sans" font-size="12" font-weigh