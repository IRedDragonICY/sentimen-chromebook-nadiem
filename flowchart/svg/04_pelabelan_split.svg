<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="970" viewBox="0 0 1300 970"><defs><marker id="arw" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7C766C"/></marker><marker id="arwR" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#D65A59"/></marker><marker id="arwG" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#199e70"/></marker></defs><text x="56" y="52" font-family="Noto Sans" font-size="13" font-weight="700" fill="#1F9E72" text-anchor="start" letter-spacing="2.5">TAHAP 2 DAN 3 . DATA LATIH</text><text x="55" y="88" font-family="Noto Sans" font-size="29" font-weight="800" fill="#1A1614" text-anchor="start">Pelabelan dan Penyusunan Data yang Bebas Kebocoran</text><text x="56" y="116" font-family="Noto Sans" font-size="15" font-weight="400" fill="#5C564F" text-anchor="start">Unit sampel adalah wakil klaster, bukan baris, sehingga klaster gold tidak pernah masuk pelatihan</text><rect x="56" y="132" width="64" height="4" rx="2" fill="#1baf7a"/><text x="1244" y="52" font-family="Noto Sans" font-size="13" font-weight="700" fill="#8A837A" text-anchor="end">sampling.py . assemble_training.py</text><rect x="450.0" y="171" width="400" height="46" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="450.0" y="168" width="400" height="46" rx="13" ry="13" fill="#F0EDE8" stroke="#9A9186" stroke-width="1.8"/><rect x="450.0" y="179" width="5" height="24" rx="2.5" fill="#9A9186"/><text x="468.0" y="197" font-family="Noto Sans" font-size="15" font-weight="700" fill="#1A1614" text-anchor="start">komentar.parquet (38.845)</text><rect x="390.0" y="243" width="520" height="72.0" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="390.0" y="240" width="520" height="72.0" rx="13" ry="13" fill="#E1ECFB" stroke="#2F79D6" stroke-width="1.8"/><rect x="390.0" y="251" width="5" height="50.0" rx="2.5" fill="#2F79D6"/><text x="408.0" y="269.5" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">Klaster near-duplikat (31.405 klaster)</text><text x="408.0" y="288.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">unit sampel adalah wakil klaster dengan likes tertinggi</text><path d="M650.0 214 L650.0 240" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="350.0" y="341.0" width="600" height="90.5" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="350.0" y="338.0" width="600" height="90.5" rx="13" ry="13" fill="#E0F2EA" stroke="#1F9E72" stroke-width="1.8"/><rect x="350.0" y="349.0" width="5" height="68.5" rx="2.5" fill="#1F9E72"/><text x="368.0" y="367.5" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">Sampling terstratifikasi</text><text x="368.0" y="386.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">Strata menurut fase, tipe teks, dan tingkat likes; ada kuota khusus untuk</text><text x="368.0" y="404.5" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">komentar paling disukai, indikasi spam, dan emoji, dengan kuota minimum tiap fase</text><path d="M650.0 312.0 L650.0 338.0" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="150" y="465.5" width="430" height="42" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="150" y="462.5" width="430" height="42" rx="13" ry="13" fill="#FBEFCF" stroke="#D9A521" stroke-width="1.8"/><rect x="150" y="473.5" width="5" height="20" rx="2.5" fill="#D9A521"/><text x="168" y="490.5" font-family="Noto Sans" font-size="14" font-weight="700" fill="#1A1614" text-anchor="start">gold_todo.csv</text><rect x="720" y="465.5" width="430" height="42" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="720" y="462.5" width="430" height="42" rx="13" ry="13" fill="#EBEEF3" stroke="#8A94A6" stroke-width="1.8"/><rect x="720" y="473.5" width="5" height="20" rx="2.5" fill="#8A94A6"/><text x="738" y="490.5" font-family="Noto Sans" font-size="14" font-weight="700" fill="#1A1614" text-anchor="start">silver_todo.csv</text><path d="M650.0 428.5 L650.0 444.5 L365.0 444.5 L365.0 462.5" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><path d="M650.0 428.5 L650.0 444.5 L935.0 444.5 L935.0 462.5" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="150" y="529.5" width="430" height="109.0" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="150" y="526.5" width="430" height="109.0" rx="13" ry="13" fill="#FBEFCF" stroke="#D9A521" stroke-width="1.8"/><rect x="150" y="537.5" width="5" height="87.0" rx="2.5" fill="#D9A521"/><text x="168" y="556.0" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">Gold: 710 komentar</text><text x="168" y="574.5" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">Dilabeli manusia mengikuti pedoman</text><text x="168" y="593.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">pelabelan proyek. Menjadi acuan</text><text x="168" y="611.5" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">untuk evaluasi dan kalibrasi.</text><path d="M365.0 504.5 L365.0 526.5" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="720" y="529.5" width="430" height="109.0" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="720" y="526.5" width="430" height="109.0" rx="13" ry="13" fill="#EBEEF3" stroke="#8A94A6" stroke-width="1.8"/><rect x="720" y="537.5" width="5" height="87.0" rx="2.5" fill="#8A94A6"/><text x="738" y="556.0" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">Silver: 5.912 komentar</text><text x="738" y="574.5" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">Dilabeli LLM lokal via Ollama (keluaran</text><text x="738" y="593.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">JSON, pedoman sama). Emoji ditangani</text><text x="738" y="611.5" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">aturan pasti. Menjadi tambahan data latih.</text><path d="M935.0 504.5 L935.0 526.5" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="330.0" y="668.5" width="640" height="90.5" rx="13" ry="13" fill="#1a140f" opacity="0.06"/><rect x="330.0" y="665.5" width="640" height="90.5" rx="13" ry="13" fill="#E1ECFB" stroke="#2F79D6" stroke-width="1.8"/><rect x="330.0" y="676.5" width="5" height="68.5" rx="2.5" fill="#2F79D6"/><text x="348.0" y="695.0" font-family="Noto Sans" font-size="15.5" font-weight="700" fill="#1A1614" text-anchor="start">Menyusun pembagian berbasis klaster dan stratifikasi sikap</text><text x="348.0" y="713.5" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">Pembagian dilakukan per klaster sehingga near-duplikat tidak melintasi batas;</text><text x="348.0" y="732.0" font-family="Noto Sans" font-size="12.5" font-weight="400" fill="#5C564F" text-anchor="start">val dan test hanya diambil dari gold yang labelnya tepercaya</text><path d="M365.0 635.5 L365.0 649.5 L650.0 649.5 L650.0 665.5" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><path d="M935.0 635.5 L935.0 649.5 L650.0 649.5 L650.0 665.5" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="80.0" y="788.0" width="360" height="52" rx="10" fill="#1a140f" opacity="0.05"/><rect x="80.0" y="786.0" width="360" height="52" rx="10" fill="#E1ECFB" stroke="#2F79D6" stroke-width="1.5"/><text x="91.0" y="810.0" font-family="Noto Sans" font-size="15" font-weight="700" fill="#1A1614" text-anchor="start">TRAIN . 6.233</text><text x="91.0" y="826.0" font-family="Noto Sans" font-size="12" font-weight="400" fill="#5C564F" text-anchor="start">321 gold dan 5.912 silver</text><path d="M650.0 756.0 L650.0 771.0 L260.0 771.0 L260.0 786.0" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="470.0" y="788.0" width="360" height="52" rx="10" fill="#1a140f" opacity="0.05"/><rect x="470.0" y="786.0" width="360" height="52" rx="10" fill="#FBEFCF" stroke="#D9A521" stroke-width="1.5"/><text x="481.0" y="810.0" font-family="Noto Sans" font-size="15" font-weight="700" fill="#1A1614" text-anchor="start">VAL . 106</text><text x="481.0" y="826.0" font-family="Noto Sans" font-size="12" font-weight="400" fill="#5C564F" text-anchor="start">hanya gold</text><path d="M650.0 756.0 L650.0 771.0 L650.0 771.0 L650.0 786.0" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="860.0" y="788.0" width="360" height="52" rx="10" fill="#1a140f" opacity="0.05"/><rect x="860.0" y="786.0" width="360" height="52" rx="10" fill="#FBEFCF" stroke="#D9A521" stroke-width="1.5"/><text x="871.0" y="810.0" font-family="Noto Sans" font-size="15" font-weight="700" fill="#1A1614" text-anchor="start">TEST . 283</text><text x="871.0" y="826.0" font-family="Noto Sans" font-size="12" font-weight="400" fill="#5C564F" text-anchor="start">hanya gold</text><path d="M650.0 756.0 L650.0 771.0 L1040.0 771.0 L1040.0 786.0" fill="none" stroke="#7C766C" stroke-width="2.0" marker-end="url(#arw)" stroke-linecap="round" stroke-linejoin="round"/><rect x="56" y="663.5" width="250" height="52" rx="10" fill="#1a140f" opacity="0.05"/><rect x="56" y="661.5" width="250" height="52" rx="10" fill="#FFFDF6" stroke="#D9C9A0" stroke-width="1.5"/><text x="67" y="683.5" font-family="Noto Sans" font-size="13" font-weight="700" fill="#1A1614" text-anchor="start">Tanpa kebocoran</text><text x="67" y="698.3" font-family="Noto Sans" font-size="10.8" font-weight="400" fill="#5C564F" text-anchor="start">silver dijamin lepas dari klaster gold</text></svg>